<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Card Dashboard</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

    :root {
        --bg-main: #f8fafc;
        --bg-card: #ffffff;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --accent-primary: #8b5cf6;
        --accent-hover: #7c3aed;
        --accent-light: #ede9fe;
        --border-color: #e2e8f0;
        
        --radius-lg: 20px;
        --radius-md: 12px;
        --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* Top Navigation Area */
    .top-nav {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        padding: 24px 40px;
        border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .brand-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--accent-primary);
        letter-spacing: -0.5px;
        text-decoration: none;
        transition: color 0.2s;
    }
    .brand-title:hover {
        color: var(--accent-hover);
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: transparent;
        border: none;
        color: var(--accent-primary);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        padding: 6px 12px 6px 0;
        margin-bottom: 16px;
        transition: transform 0.2s, color 0.2s;
    }
    .back-btn:hover {
        color: var(--accent-hover);
        transform: translateX(-4px);
    }

    .header-top-row {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 24px;
        width: 100%;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 16px;
    }

    /* Breadcrumbs */
    .breadcrumb-trail {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 18px; /* Increased font size */
        font-weight: 500;
        color: var(--text-secondary);
        flex-wrap: wrap;
    }

    .breadcrumb-item {
        cursor: pointer;
        transition: color 0.2s;
    }

    .breadcrumb-item:hover {
        color: var(--accent-primary);
    }

    .breadcrumb-item.active {
        color: var(--accent-primary); /* Stand out more */
        font-weight: 700;
        pointer-events: none;
    }

    .breadcrumb-separator {
        color: #94a3b8;
    }

    /* Main Content Area */
    .main-content {
        padding: 40px;
        flex: 1;
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
        transition: opacity 0.3s ease;
    }

    .header-section {
        margin-bottom: 40px;
    }

    .header-section h1 {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: -1px;
        margin-bottom: 8px;
    }

    .header-section p {
        font-size: 16px;
        color: var(--text-secondary);
    }

    /* Dynamic Grid */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Generic Card Styles */
    .data-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 32px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .data-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        border-color: var(--accent-light);
    }

    .card-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--accent-light);
        color: var(--accent-primary);
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 24px;
        transition: transform 0.3s ease;
    }

    .data-card:hover .card-icon {
        transform: scale(1.1);
        background: var(--accent-primary);
        color: white;
    }

    .card-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-primary);
        line-height: 1.3;
    }

    .card-subtitle {
        font-size: 14px;
        color: var(--text-secondary);
        flex: 1;
    }

    .card-footer {
        margin-top: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent-primary);
        opacity: 0.8;
        transition: opacity 0.2s;
    }

    .data-card:hover .card-footer {
        opacity: 1;
    }

    /* Disease Specific Card adjustments */
    .disease-card { border-left: 4px solid transparent; }
    .disease-card:hover { border-left-color: var(--accent-primary); }
    
    .disease-meta { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .badge-status { background: #dcfce7; color: #166534; }
    .badge-status.draft { background: #fef3c7; color: #92400e; }
    .badge-val { background: var(--accent-light); color: var(--accent-primary); }

    /* Detail Modal Overlay */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
        opacity: 1;
        pointer-events: all;
    }

    .detail-modal {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 700px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        transform: scale(0.95) translateY(20px);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
    }

    .modal-overlay.active .detail-modal {
        transform: scale(1) translateY(0);
    }

    .modal-header {
        padding: 32px 40px;
        border-bottom: 1px solid var(--border-color);
        background: linear-gradient(to right, var(--accent-light), transparent);
    }

    .modal-close {
        position: absolute;
        top: 24px;
        right: 24px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: white;
        border: 1px solid var(--border-color);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        color: var(--text-secondary);
        transition: all 0.2s;
    }
    
    .modal-close:hover {
        background: #f1f5f9;
        color: var(--text-primary);
    }

    .modal-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
    .modal-ref { font-size: 13px; color: var(--accent-primary); font-weight: 600; letter-spacing: 1px; }

    .modal-body { padding: 40px; }

    .metrics-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 40px;
    }

    .metric-item {
        background: #f8fafc;
        padding: 20px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-color);
    }

    .metric-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
    .metric-val { font-size: 20px; font-weight: 700; color: var(--text-primary); }

    .desc-section h3 { font-size: 16px; margin-bottom: 12px; color: var(--text-primary); }
    .desc-section p { font-size: 16px; line-height: 1.7; color: #475569; font-weight: 300; }

</style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="brand-title">← Main Menu | Epilume Clinical Explorer</a>
    </nav>

    <main class="main-content">
        <div class="header-section" id="page-header">
            <div class="header-top-row" id="header-top-row" style="display: none;">
                <button class="back-btn" id="back-btn" onclick="goBackOneLevel()" style="margin-bottom: 0;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Go Back
                </button>
                <div class="breadcrumb-trail" id="breadcrumbs">
                    <!-- Breadcrumbs injected by JS -->
                </div>
            </div>
            <h1 id="view-title">Cardiovascular Families</h1>
            <p id="view-subtitle">Select a family to explore conditions</p>
        </div>

        <div class="grid-container" id="grid-view">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detail-modal-bg">
        <div class="detail-modal" id="detail-modal">
            <button class="modal-close" id="modal-close-btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="modal-header">
                <div class="modal-ref" id="mod-ref">REF: CAD-101</div>
                <h2 class="modal-title" id="mod-title">Disease Name</h2>
                <div class="disease-meta" style="margin-bottom: 0; margin-top: 12px;">
                    <span class="badge badge-status" id="mod-status">Published</span>
                </div>
            </div>
            <div class="modal-body">
                <div class="metrics-row">
                    <div class="metric-item">
                        <div class="metric-label">Prevalence</div>
                        <div class="metric-val" id="mod-prev">0.0%</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">Data Year</div>
                        <div class="metric-val" id="mod-year">2024</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">Category</div>
                        <div class="metric-val" id="mod-cat" style="font-size: 16px;">Category</div>
                    </div>
                </div>
                <div class="desc-section">
                    <h3>Clinical Description</h3>
                    <p id="mod-desc">Description text here...</p>
                </div>
            </div>
        </div>
    </div>

<script>
    // 1. Data Store
    const database = [
        {
            id: 'cad', name: 'Coronary Artery Disease', diseaseCount: 9,
            folders: [
                {
                    name: 'Obstructive CAD',
                    subfolders: [
                        {
                            name: 'Stable Ischemic Heart Disease',
                            items: [
                                { id: 'CAD-101', name: 'Stable Angina', value: '1.5% - 1.7%', year: '2023', status: 'Published', desc: 'A type of chest pain caused by reduced blood flow to the heart, typically occurring with exertion or emotional stress. It follows a predictable pattern.' },
                                { id: 'CAD-102', name: 'Refractory Angina', value: '5% - 15%', year: '2016', status: 'Published', desc: 'Severe chest pain due to ischemia that cannot be controlled by optimal medical therapy, angioplasty, or bypass surgery.' }
                            ]
                        },
                        {
                            name: 'Acute Coronary Syndrome',
                            items: [
                                { id: 'CAD-103', name: 'NSTEMI', value: '35% - 65%', year: '2024', status: 'In Review', desc: 'Non-ST-segment elevation myocardial infarction. A type of heart attack where there is no ST-segment elevation on an ECG, but blood tests show heart damage.' },
                                { id: 'CAD-104', name: 'STEMI', value: '30%', year: '2024', status: 'Published', desc: 'ST-elevation myocardial infarction. A highly severe type of heart attack caused by a complete blockage of a major coronary artery.' },
                                { id: 'CAD-ACS1', name: 'Microvascular Angina', value: 'NA', year: 'N/A', status: 'Draft', desc: 'Chest pain caused by abnormalities in the tiny blood vessels of the heart.' },
                                { id: 'CAD-ACS2', name: 'Vasospastic Angina', value: 'NA', year: 'N/A', status: 'Published', desc: 'Chest pain caused by a sudden spasm in a coronary artery.' }
                            ]
                        }
                    ],
                    items: []
                },
                {
                    name: 'Non-Obstructive CAD',
                    items: [
                        { id: 'CAD-301', name: 'Microvascular Angina', value: '10% - 30%', year: '2023', status: 'Draft', desc: 'Chest pain caused by abnormalities and dysfunction in the tiny blood vessels (microcirculation) of the heart, rather than the main arteries.' }
                    ]
                }
            ]
        },
        {
            id: 'sd', name: 'Septal Defects', diseaseCount: 6,
            folders: [
                {
                    name: 'Atrial Septal Defect',
                    items: [
                        { id: 'SD-101', name: 'Secundum ASD', value: '75%', year: '2025', status: 'Published', desc: 'The most common type of atrial septal defect, located in the middle of the atrial septum.' }
                    ]
                },
                {
                    name: 'Ventricular Septal Defect',
                    items: [
                        { id: 'SD-201', name: 'Perimembranous VSD', value: '80%', year: '2024', status: 'Published', desc: 'A hole in the upper section of the ventricular septum, near the aortic and tricuspid valves.' }
                    ]
                }
            ]
        },
        {
            id: 'vte', name: 'Venous Thromboembolism', diseaseCount: 4,
            folders: [
                {
                    name: 'Pulmonary Embolism',
                    items: [
                        { id: 'VTE-201', name: 'Massive/High-Risk PE', value: '5%', year: '2022', status: 'Published', desc: 'A severe pulmonary embolism that causes sustained low blood pressure (hypotension) or cardiogenic shock.' }
                    ]
                }
            ]
        }
    ];

    // SVG Icons
    const ICONS = {
        category: `<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>`,
        folder: `<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>`,
        subfolder: `<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path></svg>`,
        disease: `<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`
    };

    // State Navigation Stack
    let navStack = []; // Elements: { level: 'root', data: database, title: 'Families' }

    // DOM Elements
    const gridEl = document.getElementById('grid-view');
    const titleEl = document.getElementById('view-title');
    const subtitleEl = document.getElementById('view-subtitle');
    const breadcrumbsEl = document.getElementById('breadcrumbs');
    
    // Modal Elements
    const modalBg = document.getElementById('detail-modal-bg');
    const modalClose = document.getElementById('modal-close-btn');

    function init() {
        navStack.push({ level: 'root', data: database, title: 'Home' });
        renderView();
        
        modalClose.onclick = () => modalBg.classList.remove('active');
        modalBg.onclick = (e) => { if(e.target === modalBg) modalBg.classList.remove('active'); };
    }

    function renderView() {
        const current = navStack[navStack.length - 1];
        
        // Render Breadcrumbs
        let bcHTML = '';
        navStack.forEach((step, idx) => {
            if(idx > 0) bcHTML += `<span class="breadcrumb-separator">/</span>`;
            if(idx === navStack.length - 1) {
                bcHTML += `<span class="breadcrumb-item active">${step.title}</span>`;
            } else {
                bcHTML += `<span class="breadcrumb-item" onclick="navigateBack(${idx})">${step.title}</span>`;
            }
        });
        breadcrumbsEl.innerHTML = bcHTML;

        // Render Header
        const headerTopRow = document.getElementById('header-top-row');
        if(current.level === 'root') {
            titleEl.textContent = 'Cardiovascular Families';
            subtitleEl.textContent = 'Select a family to explore its hierarchy and conditions.';
            if(headerTopRow) headerTopRow.style.display = 'none';
        } else {
            titleEl.textContent = current.title;
            subtitleEl.textContent = `Explore contents inside ${current.title}`;
            if(headerTopRow) headerTopRow.style.display = 'flex';
        }

        // Render Grid
        gridEl.innerHTML = '';
        
        // Ensure animation triggers
        gridEl.style.animation = 'none';
        gridEl.offsetHeight; /* trigger reflow */
        gridEl.style.animation = null;

        if (current.level === 'root') {
            current.data.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-icon">${ICONS.category}</div>
                    <div class="card-title">${cat.name}</div>
                    <div class="card-subtitle">${cat.diseaseCount} conditions indexed</div>
                    <div class="card-footer"><span>Explore Family</span> <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></div>
                `;
                card.onclick = () => navigateTo('category', cat.folders, cat.name, cat.name);
                gridEl.appendChild(card);
            });
        } 
        else if (current.level === 'category' || current.level === 'folder') {
            const foldersToRender = current.data; 
            
            foldersToRender.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-icon">${current.level === 'category' ? ICONS.folder : ICONS.subfolder}</div>
                    <div class="card-title">${folder.name}</div>
                    <div class="card-subtitle">Contains hierarchical structures</div>
                    <div class="card-footer"><span>Open Folder</span> <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></div>
                `;
                
                const nextData = { subfolders: folder.subfolders || [], items: folder.items || [] };
                
                if(nextData.subfolders.length === 0 && nextData.items.length > 0) {
                    card.onclick = () => navigateTo('items_only', nextData.items, folder.name, current.parentCat);
                } else {
                    card.onclick = () => navigateTo('folder', nextData.subfolders, folder.name, current.parentCat);
                }
                gridEl.appendChild(card);
            });

            if(current.items && current.items.length > 0) {
                renderDiseaseItems(current.items, current.parentCat);
            }
        }
        else if (current.level === 'items_only') {
            renderDiseaseItems(current.data, current.parentCat);
        }
    }

    function renderDiseaseItems(items, categoryName) {
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'data-card disease-card';
            
            const isDraft = item.status.toLowerCase() === 'draft' || item.status.toLowerCase() === 'in review';
            const statusClass = isDraft ? 'badge-status draft' : 'badge-status';

            card.innerHTML = `
                <div class="disease-meta">
                    <span class="badge ${statusClass}">${item.status}</span>
                    <span class="badge badge-val">${item.value}</span>
                </div>
                <div class="card-title" style="font-size: 18px;">${item.name}</div>
                <div class="card-subtitle" style="margin-top: 8px;">${item.desc.substring(0, 80)}...</div>
                <div class="card-footer" style="margin-top: 16px;"><span>View Clinical Data</span></div>
            `;
            card.onclick = () => showModal(item, categoryName);
            gridEl.appendChild(card);
        });
    }

    function navigateTo(level, data, title, parentCat) {
        navStack.push({ level, data, title, parentCat });
        renderView();
    }

    function navigateBack(targetIndex) {
        navStack = navStack.slice(0, targetIndex + 1);
        renderView();
    }

    function goBackOneLevel() {
        if(navStack.length > 1) {
            navigateBack(navStack.length - 2);
        }
    }

    function showModal(item, catName) {
        document.getElementById('mod-ref').textContent = `REF: ${item.id}`;
        document.getElementById('mod-title').textContent = item.name;
        document.getElementById('mod-status').textContent = item.status;
        
        const isDraft = item.status.toLowerCase() === 'draft' || item.status.toLowerCase() === 'in review';
        const modStatus = document.getElementById('mod-status');
        modStatus.className = `badge badge-status ${isDraft ? 'draft' : ''}`;

        document.getElementById('mod-prev').textContent = item.value;
        document.getElementById('mod-year').textContent = item.year;
        document.getElementById('mod-cat').textContent = catName || 'N/A';
        document.getElementById('mod-desc').textContent = item.desc;
        
        modalBg.classList.add('active');
    }

    init();
</script>
</body>
</html>
